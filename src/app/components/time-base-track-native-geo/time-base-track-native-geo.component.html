<div class="time-based-tracks-container">

  <!-- Loading Indicator -->
  <div *ngIf="showLoading" class="loading-overlay">
    <div class="loading-spinner">
      <div class="spinner"></div>
      <p>Loading time-based data...</p>
    </div>
  </div>

  <!-- Time-Based Toolbar -->
  <app-time-based-toolbar
    [selectedScale]="selectedScale"
    [isDarkTheme]="isDarkTheme"
    [isLiveTracking]="isLiveTracking"
    [latestTimestamp]="0"
    [showLoading]="showLoading"
    (scaleChange)="onScaleChange($event)"
    (themeChange)="onThemeChange($event)"
    (liveTrackingToggle)="isLiveTracking ? stopLivePolling() : startLivePolling()"
    (resetView)="onResetView()"
    (scrollToLatest)="onScrollToLatest()"
    (zoomIn)="onZoomIn()"
   
    (editToggle)="onEditToggle($event)"
    (colorChange)="onToolbarColorChange($event)"
    (rigTimeToggle)="onRigTimeToggle($event)"
    (timeRangeChange)="onTimeRangeChange($event)">
  </app-time-based-toolbar>

  <!-- Widget Container -->
  <div class="widget-container">
    <app-basewidget #widgetComponent></app-basewidget>
  </div>

  <!-- Time Statistics -->
  <div class="time-statistics" *ngIf="indexCurveTime.length > 0">
    <div class="stat-item">
      <span class="stat-label">Total Points:</span>
      <span class="stat-value">{{ indexCurveTime.length }}</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Duration:</span>
      <span class="stat-value">{{ calculateDuration() }}</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Data Points/Hour:</span>
      <span class="stat-value">{{ calculateDataPointsPerHour() }}</span>
    </div>
  </div>

</div>
